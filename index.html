<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almas Cristalizadas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root{--bg:#08080e;--bg2:#0f1020;--card:#121327;--accent:#7eb8d4;--gold:#c9a84c;--ok:#7fd39a;--text:#e7e7f5;--muted:#7d7dac;--border:rgba(126,184,212,.2)}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100%}
    body{padding-bottom:40px}
    header{text-align:center;padding:44px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(126,184,212,.08),transparent)}
    h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,3.5rem);font-weight:900;letter-spacing:.06em;background:linear-gradient(120deg,#eef,#9fc3db,#d2b161);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{margin-top:8px;color:var(--muted);letter-spacing:.2em;font-size:.72rem}
    nav{position:sticky;top:0;background:rgba(8,8,14,.94);backdrop-filter:blur(10px);padding:10px;display:flex;justify-content:center;gap:8px;border-bottom:1px solid var(--border);z-index:10}
    nav button{background:none;border:1px solid transparent;color:var(--muted);padding:8px 16px;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.12em;font-size:.72rem}
    nav button.active,nav button:hover{color:var(--accent);border-color:var(--border);background:rgba(126,184,212,.08)}
    main{max-width:1100px;margin:0 auto;padding:26px 16px}
    .view{display:none}
    .view.active{display:block}
    .sec{font-family:'Cinzel',serif;color:var(--accent);font-size:.72rem;letter-spacing:.26em;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:5px;overflow:hidden;cursor:pointer}
    .card:hover{border-color:var(--accent)}
    .thumb{aspect-ratio:3/4;background:var(--bg2);display:grid;place-items:center;color:var(--muted);font-size:.8rem}
    .meta{padding:10px 12px;border-top:1px solid var(--border)}
    .meta .n{font-family:'Cinzel',serif;color:var(--gold);font-size:.66rem;letter-spacing:.2em}
    .meta .t{margin-top:4px;font-size:.86rem}
    .meta .p{margin-top:2px;font-size:.72rem;color:var(--muted)}
    .empty{border:1px dashed var(--border);padding:40px 20px;color:var(--muted);text-align:center}
    .reader-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
    .reader-title{font-family:'Cinzel',serif;color:var(--accent)}
    .btn{background:none;border:1px solid var(--border);color:var(--text);padding:8px 12px;cursor:pointer}
    .btn:hover{border-color:var(--accent);color:var(--accent)}
    .stage-wrap{display:grid;grid-template-columns:40px 1fr 40px;gap:8px;align-items:center}
    .nav-btn{height:42px;background:none;border:1px solid var(--border);color:var(--text);cursor:pointer}
    .nav-btn:disabled{opacity:.25;cursor:default}
    #page-face{min-height:220px;background:#0b0c18;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:20px}
    #page-face canvas{width:100%;height:auto;display:block}
    .hint{color:var(--muted);font-size:.72rem;text-align:center;margin-top:8px}
    .bar{margin-top:10px;height:2px;background:var(--bg2)}
    .fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--gold))}
    .ind{text-align:center;color:var(--muted);font-family:'Cinzel',serif;font-size:.75rem;margin-top:6px}
    .panel{background:var(--card);border:1px solid var(--border);padding:18px;border-radius:6px;margin-bottom:14px}
    .fg{margin-bottom:10px}
    .fg label{display:block;color:var(--muted);font-size:.72rem;margin-bottom:4px}
    .fg input{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);color:var(--text)}
    .status{font-size:.78rem;color:var(--muted);margin-top:8px;min-height:18px}
    .status.ok{color:var(--ok)}
    .alist-row{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);padding:8px;margin-bottom:7px}
    .alist-row .left{font-size:.84rem}
    .alist-row .num{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);letter-spacing:.18em;margin-right:8px}
    .delete{background:none;border:1px solid rgba(220,110,110,.5);color:#dc8c8c;padding:4px 8px;cursor:pointer}
  </style>
</head>
<body>
<header>
  <h1>ALMAS CRISTALIZADAS</h1>
  <p class="sub">almas cristalizadas · web reader</p>
</header>

<nav>
  <button class="active" data-nav="gallery" onclick="showView('gallery')">Capítulos</button>
  <button data-nav="reader" id="nav-reader" style="display:none" onclick="showView('reader')">Leyendo</button>
  <button data-nav="admin" onclick="showView('admin')">Admin</button>
</nav>

<main>
  <section id="gallery-view" class="view active">
    <div class="sec">CAPÍTULOS DISPONIBLES</div>
    <div id="chap-grid" class="grid"></div>
  </section>

  <section id="reader-view" class="view">
    <div class="reader-head">
      <div>
        <div style="font-size:.65rem;color:var(--muted);letter-spacing:.18em">LEYENDO</div>
        <div id="reader-title" class="reader-title">—</div>
      </div>
      <button class="btn" onclick="showView('gallery')">← Capítulos</button>
    </div>
    <div class="stage-wrap">
      <button class="nav-btn" id="prev-btn" onclick="flip(-1)">→</button>
      <div id="page-face">Selecciona un capítulo</div>
      <button class="nav-btn" id="next-btn" onclick="flip(1)">←</button>
    </div>
    <div class="bar"><div id="progress" class="fill"></div></div>
    <div id="page-ind" class="ind">— / —</div>
    <div class="hint">lectura derecha → izquierda · teclas ← →</div>
  </section>

  <section id="admin-view" class="view">
    <div class="sec">PANEL ADMIN</div>
    <div class="panel">
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px">
        Sube PDFs como <code>pdfs/cap2.pdf</code> o <code>pdfs/cap-2.pdf</code>.
        El sistema los detecta automáticamente.
      </p>
      <div class="fg"><label>Número</label><input id="cn" type="number" min="1" placeholder="2"></div>
      <div class="fg"><label>Título</label><input id="ct" type="text" placeholder="Mi revancha"></div>
      <div class="fg"><label>Páginas (opcional)</label><input id="cpg" type="number" min="1" placeholder="24"></div>
      <button class="btn" onclick="saveChap()" style="width:100%">Guardar capítulo</button>
      <div id="status" class="status"></div>
    </div>
    <div class="panel">
      <div class="sec" style="margin-bottom:10px">CAPÍTULOS</div>
      <div id="alist"></div>
    </div>
  </section>
</main>

<script>
const PDF_BASE = 'pdfs/';
const SCAN_MAX = 120;
const SCAN_MISSES = 20;
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let chapters = [];
let pdfPaths = {};
let pdfDoc = null;
let curPage = 0;
let totalPages = 0;

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}

function loadMeta(){
  let raw=[];
  try{ raw = JSON.parse(localStorage.getItem('ac_meta')||'[]'); }catch(_){ raw=[]; }
  if(!Array.isArray(raw)) raw=[];
  const dedup = new Map();
  for(const r of raw){
    const num = parseInt(r?.num,10);
    if(!num || num<1) continue;
    const title = String(r?.title||`Capítulo ${num}`).slice(0,120);
    const pages = parseInt(r?.pages,10);
    dedup.set(num,{num,title,pages:pages>0?pages:null,auto:r?.auto===true});
  }
  chapters = [...dedup.values()].sort((a,b)=>a.num-b.num);
}
function saveMeta(){ localStorage.setItem('ac_meta', JSON.stringify(chapters)); }

function setStatus(msg,type=''){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type?` ${type}`:'');
}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(`${name}-view`).classList.add('active');
  document.querySelectorAll('nav button[data-nav]').forEach(b=>b.classList.remove('active'));
  const btn = document.querySelector(`nav button[data-nav="${name}"]`);
  if(btn) btn.classList.add('active');
  if(name==='admin') renderAdminList();
}

function chapterCandidates(n){
  return [`${PDF_BASE}cap${n}.pdf`,`${PDF_BASE}cap-${n}.pdf`];
}

async function urlExists(url){
  try{
    const h = await fetch(url,{method:'HEAD',cache:'no-store'});
    if(h.ok) return true;
  }catch(_){ }
  try{
    const r = await fetch(url,{method:'GET',headers:{Range:'bytes=0-1'},cache:'no-store'});
    return r.ok || r.status===206;
  }catch(_){
    return false;
  }
}

async function detectPdfPath(n){
  if(pdfPaths[n]) return pdfPaths[n];
  for(const c of chapterCandidates(n)){
    if(await urlExists(c)){
      pdfPaths[n]=c;
      return c;
    }
  }
  return null;
}

async function scanRepository(){
  const found=[];
  let misses=0;
  for(let n=1;n<=SCAN_MAX;n++){
    const path = await detectPdfPath(n);
    if(path){ found.push({num:n,path}); misses=0; }
    else { misses++; if(misses>=SCAN_MISSES) break; }
  }
  return found;
}

async function syncFromRepo(){
  const found = await scanRepository();
  const manual = chapters.filter(c=>c.auto!==true);
  const hasManual = new Set(manual.map(c=>c.num));
  const auto = found
    .filter(x=>!hasManual.has(x.num))
    .map(x=>({num:x.num,title:`Capítulo ${x.num}`,pages:null,auto:true}));
  chapters = [...manual,...auto].sort((a,b)=>a.num-b.num);
  saveMeta();
  renderGallery();
  renderAdminList();
}

function renderGallery(){
  const el = document.getElementById('chap-grid');
  if(!chapters.length){
    el.innerHTML = '<div class="empty">No hay capítulos detectados todavía.</div>';
    return;
  }
  g.innerHTML = sorted.map(ch=>{
    const isRead = readSet.has(ch.num);
    return `<div class="card${isRead?' read':''}" id="card-${ch.num}" onclick="openChap(${ch.num})">
      <div class="read-badge">✦ Leído</div>
      <div class="thumb" id="th-${ch.num}">
        <div class="num">${ch.num}</div>
        <div class="ltxt">Cargando portada…</div>
      </div>
      <div class="cinfo">
        <div class="cnum">CAPÍTULO ${ch.num}</div>
        <div class="ctitle">${escapeHtml(ch.title||'Sin título')}</div>
        <div class="cpages">${ch.pages?ch.pages+' páginas':'—'}</div>
      </div>
    </article>
  `).join('');
  chapters.forEach(c=>loadThumb(c.num));
}

async function loadThumb(num){
  const el = document.getElementById(`thumb-${num}`);
  if(!el) return;
  try{
    const pdfPath = await findPdfPath(ch.num);
    if(!pdfPath) throw new Error('PDF not found');
    pdfPathByChapter[ch.num]=pdfPath;
    const pdf = await pdfjsLib.getDocument(pdfPath).promise;
    const p   = await pdf.getPage(1);
    const vp  = p.getViewport({scale:.5});
    const c   = document.createElement('canvas');
    c.width=vp.width; c.height=vp.height;
    await p.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    const th = document.getElementById('th-'+ch.num);
    if(th){ th.innerHTML=''; th.appendChild(c); }
  } catch(e){
    const th = document.getElementById('th-'+ch.num);
    if(th){ const lt=th.querySelector('.ltxt'); if(lt) lt.textContent='Sin portada'; }
  }
}

async function openChapter(num){
  const ch = chapters.find(c=>c.num===num);
  if(!ch) return;
  document.getElementById('reader-title').textContent = `CAP ${num} — ${ch.title||''}`;
  document.getElementById('nav-reader').style.display='';
  showView('reader');
  document.getElementById('page-face').textContent='Cargando PDF…';
  try{
    const pdfPath = await findPdfPath(num);
    if(!pdfPath) throw new Error('PDF not found');
    pdfPathByChapter[num]=pdfPath;
    pdfDoc     = await pdfjsLib.getDocument(pdfPath).promise;
    totalPages = pdfDoc.numPages;
    await renderPage(1);
  } catch(e){
    setFace(`<div class="pg-ph" style="cursor:default">
      No se pudo abrir el PDF.<br>
      <span style="font-size:.7rem;opacity:.6">Verifica que exista <code>pdfs/cap${num}.pdf</code> o <code>pdfs/cap-${num}.pdf</code> y que sea PDF real (no puntero LFS).</span>
      <span style="font-size:.7rem;opacity:.6">Verifica que exista <code>pdfs/cap${num}.pdf</code> o <code>pdfs/cap-${num}.pdf</code> y que el archivo sea un PDF válido.</span>
    </div>`);
  }
}

async function renderPage(n){
  if(!pdfDoc) return;
  const page = await pdfDoc.getPage(n);
  const w = document.getElementById('page-face').getBoundingClientRect().width - 24;
  const base = page.getViewport({scale:1});
  const vp = page.getViewport({scale:Math.max(0.2,w/base.width)});
  const cv = document.createElement('canvas');
  cv.width = vp.width; cv.height = vp.height;
  await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
  const face = document.getElementById('page-face');
  face.innerHTML='';
  face.appendChild(cv);
  updateReaderUI();
}

function updateReaderUI(){
  document.getElementById('page-ind').textContent = `${curPage||'—'} / ${totalPages||'—'}`;
  document.getElementById('progress').style.width = totalPages?`${(curPage/totalPages)*100}%`:'0%';
  document.getElementById('prev-btn').disabled = !pdfDoc || curPage<=1;
  document.getElementById('next-btn').disabled = !pdfDoc || curPage>=totalPages;
}

function flip(dir){
  if(!pdfDoc) return;
  const next = curPage + dir;
  if(next<1||next>totalPages) return;
  curPage = next;
  renderPage(curPage);
}

function saveChap(){
  const num = parseInt(document.getElementById('cn').value,10);
  const title = document.getElementById('ct').value.trim();
  const pages = parseInt(document.getElementById('cpg').value,10);
  if(!num || num<1){ setStatus('Número inválido.'); return; }
  if(!title){ setStatus('Escribe un título.'); return; }
  const idx = chapters.findIndex(c=>c.num===num);
  const data = {num,title:title.slice(0,120),pages:pages>0?pages:null,auto:false};
  if(idx>=0) chapters[idx]=data; else chapters.push(data);
  chapters.sort((a,b)=>a.num-b.num);
  saveMeta();
  renderGallery();
  renderAdminList();
  setStatus(`Capítulo ${num} guardado.`, 'ok');
  document.getElementById('cn').value='';
  document.getElementById('ct').value='';
  document.getElementById('cpg').value='';
}

function deleteChap(num){
  chapters = chapters.filter(c=>c.num!==num);
  saveMeta();
  renderGallery();
  renderAdminList();
}

function renderAdminList(){
  const el = document.getElementById('alist');
  if(!chapters.length){ el.innerHTML='<div class="empty">No hay capítulos.</div>'; return; }
  el.innerHTML = chapters.map(ch=>`
    <div class="alist-row">
      <div class="left"><span class="num">CAP ${ch.num}</span>${escapeHtml(ch.title||`Capítulo ${ch.num}`)}</div>
      <button class="delete" onclick="deleteChap(${ch.num})">Eliminar</button>
    </div>
  `).join('');
}

document.addEventListener('keydown',e=>{
  const inReader = document.getElementById('reader-view').classList.contains('active');
  if(!inReader) return;
  if(e.key==='ArrowLeft') flip(1);
  if(e.key==='ArrowRight') flip(-1);
});

(function init(){
  loadMeta();
  renderGallery();
  renderAdminList();
  syncFromRepo();
})();
</script>
</body>
</html>
