<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almas Cristalizadas</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --bg:#08080e;--bg2:#0d0d1a;--bg3:#121220;
  --accent:#7eb8d4;--gold:#c9a84c;--green:#6fcf8a;
  --text:#e4e4f0;--dim:#7777aa;--border:rgba(126,184,212,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Serif JP',serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 60% at 15% 10%,rgba(126,184,212,0.05) 0%,transparent 60%),
             radial-gradient(ellipse 50% 70% at 85% 90%,rgba(201,168,76,0.04) 0%,transparent 60%);}

header{position:relative;z-index:1;text-align:center;padding:52px 20px 36px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(126,184,212,0.07) 0%,transparent 100%);}
.tag{font-size:.7rem;letter-spacing:.45em;color:var(--accent);opacity:.6;margin-bottom:10px;text-transform:uppercase;}
h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,3.6rem);font-weight:900;letter-spacing:.06em;
  background:linear-gradient(130deg,#e4e4f0 25%,var(--accent) 60%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{margin-top:10px;font-size:.72rem;letter-spacing:.28em;color:var(--dim);}
.deco{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px;}
.deco::before,.deco::after{content:'';width:70px;height:1px;}
.deco::before{background:linear-gradient(90deg,transparent,var(--accent));}
.deco::after{background:linear-gradient(90deg,var(--accent),transparent);}
.diamond{width:7px;height:7px;background:var(--accent);transform:rotate(45deg);box-shadow:0 0 10px var(--accent);}

nav{position:sticky;top:0;z-index:200;display:flex;justify-content:center;gap:4px;padding:10px 20px;
  background:rgba(8,8,14,0.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
nav button{background:none;border:none;color:var(--dim);font-family:'Cinzel',serif;font-size:.72rem;
  letter-spacing:.15em;padding:8px 18px;cursor:pointer;border-radius:2px;transition:all .2s;text-transform:uppercase;}
nav button:hover,nav button.active{color:var(--accent);background:rgba(126,184,212,0.08);}
nav button.active{border-bottom:1px solid var(--accent);}

main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:36px 20px 60px;}
.view{display:none;}
.view.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sec{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.38em;color:var(--accent);
  text-transform:uppercase;margin-bottom:22px;display:flex;align-items:center;gap:12px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* GALLERY */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:4px;overflow:hidden;
  cursor:pointer;transition:all .25s;position:relative;}
.card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 10px 32px rgba(126,184,212,0.13);}
.card.read{border-color:rgba(111,207,138,0.35);}
.card.read:hover{border-color:var(--green);}

/* Badge leído */
.read-badge{
  position:absolute;top:8px;right:8px;z-index:2;
  background:rgba(10,10,18,0.85);border:1px solid var(--green);
  color:var(--green);font-size:.6rem;letter-spacing:.12em;
  padding:3px 7px;border-radius:2px;
  display:none;text-transform:uppercase;font-family:'Cinzel',serif;
  backdrop-filter:blur(4px);
}
.card.read .read-badge{display:block;}

/* Botón marcar leído en la tarjeta */
.mark-btn{
  display:block;width:100%;
  background:none;border:none;border-top:1px solid var(--border);
  color:var(--dim);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;
  padding:9px;cursor:pointer;transition:all .2s;text-transform:uppercase;
  text-align:center;
}
.mark-btn:hover{color:var(--green);background:rgba(111,207,138,0.05);}
.card.read .mark-btn{color:var(--green);background:rgba(111,207,138,0.06);}

.thumb{width:100%;aspect-ratio:3/4;background:var(--bg2);display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;position:relative;}
.thumb canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.thumb .num{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:700;color:var(--accent);opacity:.15;}
.thumb .ltxt{position:absolute;bottom:8px;font-size:.62rem;letter-spacing:.1em;color:var(--dim);}
.cinfo{padding:11px 13px;border-top:1px solid var(--border);}
.cnum{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.2em;color:var(--gold);margin-bottom:3px;}
.ctitle{font-size:.82rem;color:var(--text);line-height:1.3;}
.cpages{font-size:.68rem;color:var(--dim);margin-top:3px;}
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;border:1px dashed var(--border);border-radius:4px;color:var(--dim);}
.empty p{font-size:.88rem;line-height:1.9;}

/* READER */
#reader-view{width:100%;}
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.rhead h2{font-family:'Cinzel',serif;font-size:.95rem;color:var(--accent);}
.rhead-btns{display:flex;gap:8px;flex-wrap:wrap;}

.flipbook-wrapper{display:grid;grid-template-columns:40px 1fr 40px;align-items:center;gap:8px;width:100%;}
.flip-nav{background:none;border:1px solid var(--border);color:var(--text);
  width:40px;height:40px;border-radius:2px;cursor:pointer;font-size:1rem;
  transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.flip-nav:hover{border-color:var(--accent);color:var(--accent);}
.flip-nav:disabled{opacity:.2;cursor:default;}

.book-stage{width:100%;perspective:2000px;}
.page-wrap{transform-style:preserve-3d;width:100%;}
.page-face{width:100%;background:#0a0a14;border-radius:3px;
  box-shadow:0 24px 70px rgba(0,0,0,0.8);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  min-height:200px;cursor:zoom-in;}
.page-face canvas{width:100%;height:auto;display:block;}
.pg-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--dim);padding:80px 40px;font-size:.8rem;cursor:default;}

.flip-out{animation:fOut .25s ease-in forwards;transform-origin:left center;}
.flip-in{animation:fIn .25s ease-out forwards;transform-origin:left center;}
.flip-out-r{animation:fOutR .25s ease-in forwards;transform-origin:right center;}
.flip-in-r{animation:fInR .25s ease-out forwards;transform-origin:right center;}
@keyframes fOut{from{transform:rotateY(0)}to{transform:rotateY(88deg)}}
@keyframes fIn{from{transform:rotateY(-88deg)}to{transform:rotateY(0)}}
@keyframes fOutR{from{transform:rotateY(0)}to{transform:rotateY(-88deg)}}
@keyframes fInR{from{transform:rotateY(88deg)}to{transform:rotateY(0)}}

.progress-bar{width:100%;height:2px;background:var(--bg3);margin-top:12px;border-radius:1px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s;}
.page-ind{font-family:'Cinzel',serif;font-size:.75rem;color:var(--dim);text-align:center;margin-top:8px;}
.hint{text-align:center;font-size:.65rem;color:var(--dim);opacity:.45;margin-top:6px;letter-spacing:.08em;}

/* ZOOM */
#zoom-overlay{display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.96);overflow:hidden;touch-action:none;}
#zoom-overlay.open{display:flex;align-items:center;justify-content:center;}
#zoom-img{display:block;max-width:100%;max-height:100%;object-fit:contain;
  transform-origin:center center;transition:transform .08s ease;
  cursor:grab;user-select:none;pointer-events:none;}
#zoom-img.grabbing{cursor:grabbing;}
#zoom-controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:10000;}
#zoom-controls button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  color:#fff;font-size:1.1rem;width:40px;height:40px;border-radius:50%;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;}
#zoom-controls button:hover{background:rgba(255,255,255,0.2);}
#zoom-close-btn{position:fixed;top:16px;right:20px;z-index:10000;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-size:1rem;width:36px;height:36px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;}
#zoom-close-btn:hover{background:rgba(255,255,255,0.18);}

.btn{background:none;border:1px solid var(--border);color:var(--text);
  font-family:'Noto Serif JP',serif;font-size:.78rem;padding:8px 15px;
  cursor:pointer;border-radius:2px;transition:all .2s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-ac{border-color:var(--accent);color:var(--accent);}

@media(max-width:600px){
  .flipbook-wrapper{grid-template-columns:32px 1fr 32px;gap:4px;}
  .flip-nav{width:32px;height:32px;font-size:.85rem;}
}
</style>
</head>
<body>

<header>
  <div class="tag">◆ manga ◆</div>
  <h1>Almas Cristalizadas</h1>
  <p class="sub">almas cristalizadas · web reader</p>
  <div class="deco"><div class="diamond"></div></div>
</header>

<nav>
  <button class="active" onclick="showView('gallery')">Capítulos</button>
  <button id="nav-read" style="display:none" onclick="showView('reader')">Leyendo</button>
</nav>

<main>
  <!-- GALLERY -->
  <div id="gallery-view" class="view active">
    <div class="sec">Capítulos disponibles</div>
    <div class="grid" id="chap-grid"></div>
  </div>

  <!-- READER -->
  <div id="reader-view" class="view">
    <div class="rhead">
      <div>
        <div style="font-size:.6rem;letter-spacing:.2em;color:var(--dim);margin-bottom:3px">LEYENDO</div>
        <h2 id="r-title">—</h2>
      </div>
      <div class="rhead-btns">
        <button class="btn" onclick="showView('gallery')">← Capítulos</button>
        <button class="btn btn-ac" onclick="openZoom()">🔍 Zoom</button>
      </div>
    </div>
    <div class="flipbook-wrapper">
      <button class="flip-nav" id="btn-next" onclick="flip(1)">←</button>
      <div class="book-stage">
        <div class="page-wrap" id="page-wrap">
          <div class="page-face" id="page-face" onclick="openZoom()">
            <div class="pg-ph">
              <div style="font-size:1.5rem;opacity:.3">◆</div>
              <span>Selecciona un capítulo</span>
            </div>
          </div>
        </div>
      </div>
      <button class="flip-nav" id="btn-prev" onclick="flip(-1)">→</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="page-ind" id="pind">— / —</div>
    <div class="hint">derecha → izquierda &nbsp;·&nbsp; toca la página para zoom &nbsp;·&nbsp; teclas ← →</div>
  </div>
</main>

<!-- ZOOM -->
<div id="zoom-overlay">
  <button id="zoom-close-btn" onclick="closeZoom()">✕</button>
  <img id="zoom-img" src="" alt="zoom" draggable="false"/>
  <div id="zoom-controls">
    <button onclick="zoomOut()" title="Alejar">−</button>
    <button onclick="zoomReset()" title="Restablecer">⊙</button>
    <button onclick="zoomIn()" title="Acercar">+</button>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────
const PDF_BASE = 'pdfs/';
// Lista de capítulos — edita esto cuando subas un capítulo nuevo a GitHub
// Formato: { num: N, title: 'Título', pages: N }
const CHAPTERS = [
  // { num: 1, title: 'Soy la mejor de este lugar', pages: 24 },
  // { num: 2, title: 'Mi revancha', pages: 20 },
];

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ─────────────────────────────────────────────
let curChapNum = null, curPage = 0, totalPages = 0;
let pdfDoc = null, flipping = false;
let curDataUrl = null;
let readSet = new Set(); // capítulos marcados como leídos

// Zoom
let zScale=1, zX=0, zY=0;
let isDragging=false, dragSX=0, dragSY=0, dragOX=0, dragOY=0;
let lastPinch=null;

// ── INIT ──────────────────────────────────────────────
(function init(){
  loadRead();
  renderGallery();
  setupZoom();
  document.addEventListener('keydown', e=>{
    const inReader = document.getElementById('reader-view').classList.contains('active');
    const zOpen    = document.getElementById('zoom-overlay').classList.contains('open');
    if(zOpen){
      if(e.key==='Escape') closeZoom();
      if(e.key==='+'||e.key==='=') zoomIn();
      if(e.key==='-') zoomOut();
      if(e.key==='0') zoomReset();
      return;
    }
    if(inReader){
      if(e.key==='ArrowLeft')  flip(1);
      if(e.key==='ArrowRight') flip(-1);
      if(e.key==='z'||e.key==='Z') openZoom();
    }
  });
})();

// ── READ TRACKING ─────────────────────────────────────
function loadRead(){
  try{
    const raw = localStorage.getItem('ac_read');
    readSet = new Set(raw ? JSON.parse(raw) : []);
  } catch(e){ readSet=new Set(); }
}
function saveRead(){
  localStorage.setItem('ac_read', JSON.stringify([...readSet]));
}
function toggleRead(num, e){
  e.stopPropagation(); // no abrir el capítulo
  if(readSet.has(num)) readSet.delete(num);
  else readSet.add(num);
  saveRead();
  // Actualizar solo esa tarjeta sin rerenderizar todo
  const card = document.getElementById('card-'+num);
  if(card){
    card.classList.toggle('read', readSet.has(num));
    const btn = card.querySelector('.mark-btn');
    if(btn) btn.textContent = readSet.has(num) ? '✦ Leído' : '◇ Marcar como leído';
  }
}

// ── VIEWS ─────────────────────────────────────────────
function showView(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById(v+'-view').classList.add('active');
  const idxMap={gallery:0,reader:1};
  if(idxMap[v]!=null)
    document.querySelectorAll('nav button')[idxMap[v]].classList.add('active');
  if(v==='gallery') renderGallery();
}

// ── GALLERY ───────────────────────────────────────────
function renderGallery(){
  const g = document.getElementById('chap-grid');
  if(!CHAPTERS.length){
    g.innerHTML=`<div class="empty">
      <div style="font-size:2rem;opacity:.2;margin-bottom:14px">◆</div>
      <p>Aún no hay capítulos publicados.<br>¡Pronto habrá contenido aquí!</p>
    </div>`;
    return;
  }
  const sorted = [...CHAPTERS].sort((a,b)=>a.num-b.num);
  g.innerHTML = sorted.map(ch=>{
    const isRead = readSet.has(ch.num);
    return `
    <div class="card${isRead?' read':''}" id="card-${ch.num}" onclick="openChap(${ch.num})">
      <div class="read-badge">✦ Leído</div>
      <div class="thumb" id="th-${ch.num}">
        <div class="num">${ch.num}</div>
        <div class="ltxt">Cargando portada…</div>
      </div>
      <div class="cinfo">
        <div class="cnum">CAPÍTULO ${ch.num}</div>
        <div class="ctitle">${ch.title||'Sin título'}</div>
        <div class="cpages">${ch.pages ? ch.pages+' páginas' : '—'}</div>
      </div>
      <button class="mark-btn" onclick="toggleRead(${ch.num},event)">
        ${isRead ? '✦ Leído' : '◇ Marcar como leído'}
      </button>
    </div>`;
  }).join('');
  sorted.forEach(ch=>loadThumb(ch));
}

async function loadThumb(ch){
  try{
    const pdf = await pdfjsLib.getDocument(PDF_BASE+'cap-'+ch.num+'.pdf').promise;
    const p   = await pdf.getPage(1);
    const vp  = p.getViewport({scale:0.5});
    const c   = document.createElement('canvas');
    c.width=vp.width; c.height=vp.height;
    await p.render({canvasContext:c.getContext('2d'), viewport:vp}).promise;
    const th = document.getElementById('th-'+ch.num);
    if(th){ th.innerHTML=''; th.appendChild(c); }
  } catch(e){
    const th = document.getElementById('th-'+ch.num);
    if(th){ const lt=th.querySelector('.ltxt'); if(lt) lt.textContent='Sin portada'; }
  }
}

// ── READER ────────────────────────────────────────────
async function openChap(num){
  const ch = CHAPTERS.find(c=>c.num===num);
  if(!ch){ return; }
  curChapNum=num; curPage=1; pdfDoc=null; curDataUrl=null;
  document.getElementById('r-title').textContent=`Cap. ${ch.num} — ${ch.title||''}`;
  document.getElementById('nav-read').style.display='';
  showView('reader');
  setFace('<div class="pg-ph"><div style="font-size:1.5rem;opacity:.4">◆</div><span>Cargando PDF…</span></div>');
  try{
    pdfDoc     = await pdfjsLib.getDocument(PDF_BASE+'cap-'+num+'.pdf').promise;
    totalPages = pdfDoc.numPages;
    await renderPage(1);
  } catch(e){
    setFace(`<div class="pg-ph" style="cursor:default">No se encontró el PDF.<br>
      <span style="font-size:.7rem;opacity:.6">Verifica que pdfs/cap-${num}.pdf existe en el repo.</span></div>`);
  }
}

async function renderPage(n){
  if(!pdfDoc) return;
  const page   = await pdfDoc.getPage(n);
  const stage  = document.querySelector('.book-stage');
  const availW = stage ? stage.getBoundingClientRect().width : window.innerWidth*0.9;
  const native = page.getViewport({scale:1});
  const scale  = availW/native.width;
  const vp     = page.getViewport({scale});
  const canvas = document.createElement('canvas');
  canvas.width=vp.width; canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
  curDataUrl = canvas.toDataURL('image/png');
  canvas.style.width='100%'; canvas.style.height='auto'; canvas.style.display='block';
  setFace('');
  document.getElementById('page-face').appendChild(canvas);
  updInd();
}

function setFace(html){ document.getElementById('page-face').innerHTML=html; curDataUrl=null; }

function updInd(){
  document.getElementById('pind').textContent=`${curPage} / ${totalPages}`;
  document.getElementById('prog').style.width=`${(curPage/totalPages)*100}%`;
  document.getElementById('btn-next').disabled=curPage>=totalPages;
  document.getElementById('btn-prev').disabled=curPage<=1;
}

function flip(dir){
  if(flipping||!pdfDoc) return;
  const next=curPage+dir;
  if(next<1||next>totalPages) return;
  flipping=true;
  const wrap=document.getElementById('page-wrap');
  const co=dir===1?'flip-out':'flip-out-r';
  const ci=dir===1?'flip-in':'flip-in-r';
  wrap.classList.add(co);
  wrap.addEventListener('animationend', async()=>{
    wrap.classList.remove(co);
    curPage=next;
    await renderPage(curPage);
    wrap.classList.add(ci);
    wrap.addEventListener('animationend',()=>{ wrap.classList.remove(ci); flipping=false; },{once:true});
  },{once:true});
}

// ── ZOOM ──────────────────────────────────────────────
function openZoom(){
  if(!curDataUrl) return;
  zScale=1; zX=0; zY=0;
  document.getElementById('zoom-img').src=curDataUrl;
  applyZ();
  document.getElementById('zoom-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeZoom(){
  document.getElementById('zoom-overlay').classList.remove('open');
  document.body.style.overflow='';
}
function applyZ(){
  document.getElementById('zoom-img').style.transform=`translate(${zX}px,${zY}px) scale(${zScale})`;
}
function zoomIn() { zScale=Math.min(zScale*1.3,6); applyZ(); }
function zoomOut(){ zScale=Math.max(zScale/1.3,0.5); applyZ(); }
function zoomReset(){ zScale=1; zX=0; zY=0; applyZ(); }

function setupZoom(){
  const ov=document.getElementById('zoom-overlay');
  const img=document.getElementById('zoom-img');

  ov.addEventListener('click', e=>{ if(e.target===ov) closeZoom(); });
  ov.addEventListener('wheel', e=>{ e.preventDefault(); e.deltaY<0?zoomIn():zoomOut(); },{passive:false});

  // Mouse drag
  ov.addEventListener('mousedown', e=>{
    if(e.target===ov) return;
    isDragging=true; dragSX=e.clientX; dragSY=e.clientY; dragOX=zX; dragOY=zY;
    img.classList.add('grabbing'); e.preventDefault();
  });
  window.addEventListener('mousemove', e=>{
    if(!isDragging) return;
    zX=dragOX+(e.clientX-dragSX); zY=dragOY+(e.clientY-dragSY); applyZ();
  });
  window.addEventListener('mouseup', ()=>{ isDragging=false; img.classList.remove('grabbing'); });

  // Touch pinch + drag
  ov.addEventListener('touchstart', e=>{
    if(e.touches.length===2) lastPinch=pinchD(e.touches);
    else if(e.touches.length===1){
      isDragging=true;
      dragSX=e.touches[0].clientX; dragSY=e.touches[0].clientY; dragOX=zX; dragOY=zY;
    }
  },{passive:true});
  ov.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const d=pinchD(e.touches);
      if(lastPinch){ zScale=Math.min(Math.max(zScale*(d/lastPinch),0.5),6); applyZ(); }
      lastPinch=d;
    } else if(e.touches.length===1&&isDragging){
      zX=dragOX+(e.touches[0].clientX-dragSX);
      zY=dragOY+(e.touches[0].clientY-dragSY); applyZ();
    }
  },{passive:false});
  ov.addEventListener('touchend', e=>{
    if(e.touches.length<2) lastPinch=null;
    if(e.touches.length===0) isDragging=false;
  },{passive:true});
}

function pinchD(t){
  const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}
